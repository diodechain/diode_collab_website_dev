  download:
    title: Get the App
    url: "/download/"
  node:
    title: Run a Node
    url: "https://network.docs.diode.io/docs/"
  terms:
    title: Terms
    url: "/terms/"
  privacy:
    title: Privacy Policy
    url: "/privacy-policy/"
  thanks:
    title: Thank You
    url: "/download/thanks/"


