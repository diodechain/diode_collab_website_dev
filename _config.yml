# General Settings
name: Diode
title: Diode&#8482;
description: Diode enables digital sovereignty in everyday interactions.
url: https://diode.io


# Theme Settings
theme: minima
minima:
  date_format: "%b %-d, %Y"
sass:
  style: compressed
plugins:
# - jekyll-feed
- jekyll-paginate
- jekyll-seo-tag
- jekyll-redirect-from
- jekyll-sitemap


# Path
path:
  images: "/assets/img/"
  styles: "/assets/css/"
  scripts: "/assets/js/"
  favicon: "/assets/favicon/"


# Navigation
nav:
- title: Pricing
  url: "/pricing/"
- title: Stories
  url: "/blog/"
- title: Docs
  url: "https://docs.diode.io/"
  target: _blank
- title: Support
  url: "/joinzone/?zone=Support#GZF6Mm8FE23omWQ53l4S-pzr2V3LYPlLncupAbPCXnDU9biiaFDTc8sJJwsM"
- title: Learn More
  url: "/about/"
- title: Download
  url: "/download/"

# Other Links
